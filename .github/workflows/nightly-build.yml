name: "Nightly Build"

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        build-type: [DevBuild]  # [Debug, DevBuild, Release]

    steps:
      - uses: Metadorius/checkout@d1a22c1aff33852a0154ff5262e4eab45178154c # fixed SpecificSubmodule branch
        with:
          ssh-key: ${{ secrets.yr-simd_CI_SSH_PRIVATEKEY }}
          submodule-directories: |
            YRpp

      - name: Build
        uses: ./.github/actions/build
        with:
          build-config: ${{ matrix.build-type }}
          artifact-name: yr-simd-${{ matrix.build-type }}-${{ github.sha }}
